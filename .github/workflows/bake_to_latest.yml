name: Build release-tags

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Python syntax check
        run: python3 -m py_compile py-kms/*.py docker/*.py

  bake-latest:
    needs: quality-check
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      HAS_DOCKERHUB_CREDS: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Normalize image owner
        run: echo "IMAGE_OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        if: env.HAS_DOCKERHUB_CREDS == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (full) GHCR only
        if: env.HAS_DOCKERHUB_CREDS != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/docker-py3-kms/Dockerfile
          platforms: linux/amd64,linux/386,linux/arm64/v8,linux/arm/v7,linux/arm/v6
          push: true
          provenance: false
          cache-from: type=gha,scope=pykms-master-full
          cache-to: type=gha,scope=pykms-master-full,mode=max
          tags: ghcr.io/${{ env.IMAGE_OWNER_LC }}/py-kms:python3,ghcr.io/${{ env.IMAGE_OWNER_LC }}/py-kms:latest
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_BRANCH=${{ github.ref_name }}
      - name: Build (full) DockerHub + GHCR
        if: env.HAS_DOCKERHUB_CREDS == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/docker-py3-kms/Dockerfile
          platforms: linux/amd64,linux/386,linux/arm64/v8,linux/arm/v7,linux/arm/v6
          push: true
          provenance: false
          cache-from: type=gha,scope=pykms-master-full
          cache-to: type=gha,scope=pykms-master-full,mode=max
          tags: ${{ secrets.DOCKER_USERNAME }}/py-kms:python3,${{ secrets.DOCKER_USERNAME }}/py-kms:latest,ghcr.io/${{ env.IMAGE_OWNER_LC }}/py-kms:python3,ghcr.io/${{ env.IMAGE_OWNER_LC }}/py-kms:latest
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_BRANCH=${{ github.ref_name }}
